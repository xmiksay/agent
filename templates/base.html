<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tasks{% endblock %} - GitLab Claude Agent</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --yellow: #d29922;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 0; margin-bottom: 1.5rem; }
    header .container { display: flex; align-items: center; gap: 1.5rem; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header nav a { color: var(--muted); font-size: 0.9rem; }
    header nav a:hover { color: var(--text); }
    .badge {
      display: inline-block; padding: 0.15em 0.5em; border-radius: 1em;
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    }
    .badge-pending  { background: var(--yellow); color: #000; }
    .badge-running  { background: var(--accent); color: #000; }
    .badge-completed { background: var(--green); color: #000; }
    .badge-failed   { background: var(--red); color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
    tr:hover { background: var(--surface); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; margin-bottom: 1rem; }
    .card h2 { font-size: 1rem; margin-bottom: 0.75rem; }
    .meta { color: var(--muted); font-size: 0.85rem; }
    .btn {
      display: inline-block; padding: 0.4em 1em; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border);
      background: var(--green); color: #000; text-decoration: none;
    }
    .btn:hover { opacity: 0.9; text-decoration: none; }
    dl { display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 1rem; }
    dt { color: var(--muted); font-size: 0.85rem; }
    dd { font-size: 0.9rem; }
    pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; overflow-x: auto; font-size: 0.85rem; margin-top: 0.5rem; white-space: pre-wrap; }
    .filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .filters a {
      padding: 0.3em 0.8em; border-radius: 1em; font-size: 0.8rem;
      border: 1px solid var(--border); color: var(--muted);
    }
    .filters a:hover, .filters a.active { color: var(--text); border-color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>GitLab Claude Agent</h1>
      <nav><a href="/">Tasks</a></nav>
    </div>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
