name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint + test (make verify)
    runs-on: ubuntu-latest

    # The integration tests in tests/ create a throwaway database per test off
    # DATABASE_URL, so the service role needs CREATE DATABASE (the default
    # `postgres` superuser has it).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Tests derive the admin URL by swapping the trailing db name for
      # `/postgres`, so a path component is required here.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/agent
      CARGO_TERM_COLOR: always
      # The runner image ships nvm preinstalled, which would make the Makefile's
      # `nvm use` try to switch to the .nvmrc version inside nvm (not installed).
      # Pointing NVM_DIR at a nonexistent dir makes the Makefile fall back to the
      # PATH node that actions/setup-node provides.
      NVM_DIR: /nonexistent

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          # Persist the compiled dependencies even when lint/tests fail, so a red
          # run doesn't force the next one to rebuild from cold.
          cache-on-failure: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # rust-embed bakes frontend/dist/ into the binary, so the SPA must be built
      # before any cargo build/clippy/test — `make frontend` does npm ci + build.
      - name: Build SPA bundle
        run: make frontend

      # lint (cargo fmt --check + clippy -D warnings + frontend typecheck) + tests.
      - name: make verify
        run: make verify
